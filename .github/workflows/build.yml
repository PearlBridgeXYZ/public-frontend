name: build

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (mainnet)
        run: npm run build -- --mode mainnet

      - name: Hash bundle
        run: |
          cd dist
          find . -type f -exec sha256sum {} + | sort > ../bundle-shas.txt
          echo "## Bundle SHA-256" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat ../bundle-shas.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload bundle hashes
        uses: actions/upload-artifact@v4
        with:
          name: bundle-shas
          path: bundle-shas.txt
          retention-days: 90

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 30

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/next' || github.ref == 'refs/heads/main')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NODE_OPTIONS: --dns-result-order=ipv4first
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            PROJECT=pearlbridge-xyz
          else
            PROJECT=pearlbridge-next
          fi
          npx -y wrangler@4 pages deploy dist \
            --project-name="$PROJECT" \
            --branch="${{ github.ref_name }}" \
            --commit-hash="${{ github.sha }}" \
            --commit-message="${{ github.event.head_commit.message }}"
