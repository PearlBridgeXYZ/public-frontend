name: build

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node from .nvmrc
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (mainnet)
        run: npm run build -- --mode mainnet

      - name: Hash bundle
        run: |
          cd dist
          find . -type f -exec sha256sum {} + | sort > ../bundle-shas.txt
          echo "## Bundle SHA-256" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat ../bundle-shas.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload bundle hashes
        uses: actions/upload-artifact@v4
        with:
          name: bundle-shas
          path: bundle-shas.txt
          retention-days: 90

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 30
